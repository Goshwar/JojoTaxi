<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FUNtastic Taxi & Tours - Professional airport transfers and island tours in St. Lucia with reliable, friendly service. Book your transportation today!" />
    <title>FUNtastic Taxi &amp; Tours | Airport Transfers &amp; Island Tours</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FUNtastic Taxi & Tours | St. Lucia Airport Transfers" />
    <meta property="og:description" content="Professional airport transfers and island tours in St. Lucia. Fixed rates, 24/7 service, licensed drivers." />
    <meta property="og:url" content="https://funtastiv.com" />

    <!-- Language alternates -->
    <link rel="alternate" hreflang="en" href="https://funtastiv.com" />
    <link rel="alternate" hreflang="fr" href="https://funtastiv.com/fr" />
    <link rel="alternate" hreflang="de" href="https://funtastiv.com/de" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />

    <!-- Print Styles -->
    <style media="print">
      nav, footer { display: none !important; }
      .booking-summary { width: 100% !important; }
      @page { margin: 2cm; }
    </style>

    <!-- Reduced Motion -->
    <style>
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.001ms !important;
          transition: none !important;
          scroll-behavior: auto !important;
        }
      }
    </style>

    <!-- Unregister stale service workers -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var reg of registrations) { reg.unregister(); }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
