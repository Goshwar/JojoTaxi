<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FUNtastic Taxi & Tours - Professional airport transfers and island tours in St. Lucia with reliable, friendly service. Book your transportation today!" />
    <title>FUNtastic Taxi & Tours | Airport Transfers & Island Tours</title>
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/fonts/Inter-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/Inter-Medium.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/Poppins-Bold.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preconnect" href="https://static.whatschat.io" crossorigin>
    
    <!-- Language alternates -->
    <link rel="alternate" hreflang="en" href="https://funtastiv.com" />
    <link rel="alternate" hreflang="fr" href="https://funtastiv.com/fr" />
    <link rel="alternate" hreflang="de" href="https://funtastiv.com/de" />
    
    <!-- Prefetch internal pages -->
    <link rel="prefetch" href="/services" as="document">
    <link rel="prefetch" href="/rates-and-zones" as="document">
    <link rel="prefetch" href="/contact" as="document">
    
    <!-- Critical CSS -->
    <style>
      /* Inline critical CSS here */
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/Inter-Regular.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('/fonts/Inter-Medium.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Poppins';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/fonts/Poppins-Bold.woff2') format('woff2');
      }
    </style>
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-default@5/default.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    
    <!-- Logtail Error Tracking -->
    <script>
      window.addEventListener('error', function(e) {
        fetch('https://in.logtail.com/STLUCIA_ERROR_KEY', {
          method: 'POST',
          body: JSON.stringify({
            message: e.message,
            filename: e.filename,
            lineno: e.lineno,
            colno: e.colno,
            error: e.error?.stack
          })
        });
      });
    </script>

    <!-- GA4 with Consent Mode -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('consent', 'default', {
        'analytics_storage': 'denied'
      });
      gtag('config', 'G-XXXXXXXX');
    </script>

    <!-- Print Styles -->
    <style media="print">
      nav, footer { display: none !important; }
      .booking-summary { width: 100% !important; }
      @page { margin: 2cm; }
    </style>

    <!-- Reduced Motion -->
    <style>
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.001ms !important;
          transition: none !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" defer></script>
    
    <!-- UptimeRobot Status -->
    <img 
      alt="" 
      src="https://uptime.bolt.watch/STLUCIA_STATUS_KEY.svg" 
      loading="lazy" 
      width="0" 
      height="0" 
      style="display:none;"
    />

    <!-- Flight Tracking Hook -->
    <script id="flightHook" defer>
      /* TODO: when ready, replace DEMO_KEY with real one and remove mockData */
      async function fetchFlightETA(flightNo) {
        const mockData = { eta: "14:55", terminal: "Arrivals Gate 2" };
        return mockData;
      }
      window.addEventListener("book-form-success", async e => {
        const eta = (await fetchFlightETA(e.detail.flight)).eta;
        sessionStorage.setItem("eta", eta);
        // Will be used by dispatcher dashboard later
      });
    </script>
  </body>
</html>
